<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #eee;
      padding: 16px;
    }
    h3 { font-size: 14px; color: #0cf; margin-bottom: 10px; }
    .row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; background: #1a1a2e; border-radius: 6px; margin-bottom: 8px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; flex-shrink: 0; }
    .dot.on { background: #0f8; box-shadow: 0 0 6px #0f8; }
    .dot.off { background: #f44; }
    .label { font-size: 11px; color: #888; margin-bottom: 2px; }
    .value { font-family: monospace; font-size: 12px; word-break: break-all; }
    .copy {
      display: block; width: 100%; padding: 6px;
      background: #0cf; color: #000; border: none; border-radius: 4px;
      font-weight: 600; font-size: 12px; cursor: pointer; margin-top: 8px;
    }
    .copy:hover { background: #0ae; }
    .input-row { margin-top: 8px; }
    .input-row input {
      width: 100%; padding: 6px 8px; background: #1a1a2e; border: 1px solid #333;
      color: #eee; border-radius: 4px; font-size: 11px; font-family: monospace;
    }
    .input-row input:focus { border-color: #0cf; outline: none; }
    .save-btn {
      display: block; width: 100%; padding: 5px;
      background: #333; color: #0cf; border: 1px solid #0cf; border-radius: 4px;
      font-size: 11px; cursor: pointer; margin-top: 4px;
    }
    .save-btn:hover { background: #0cf; color: #000; }
    .hint { font-size: 10px; color: #555; margin-top: 6px; }
  </style>
</head>
<body>
  <h3>🔗 Browser Control</h3>

  <div class="row">
    <div class="dot" id="dot"></div>
    <span id="statusText">Connecting...</span>
  </div>

  <div class="label">Extension ID:</div>
  <div class="value" id="extId">loading...</div>
  <button class="copy" id="copyBtn">📋 Copy Extension ID</button>

  <div class="label" style="margin-top: 10px">Active Tab:</div>
  <div class="value" id="url" style="color:#888;font-size:11px">—</div>

  <div class="input-row" style="margin-top: 10px">
    <div class="label">Relay URL (CF Workers):</div>
    <input type="text" id="relayUrl" placeholder="https://rbc-relay.xxx.workers.dev">
    <button class="save-btn" id="saveBtn">💾 Save & Reconnect</button>
  </div>

  <div class="hint" id="hint"></div>

  <script src="popup.js"></script>
</body>
</html>
