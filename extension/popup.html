<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #eee;
      padding: 16px;
    }
    h3 { font-size: 14px; color: #0cf; margin-bottom: 10px; }
    .row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; background: #1a1a2e; border-radius: 6px; margin-bottom: 8px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; flex-shrink: 0; }
    .dot.on { background: #0f8; box-shadow: 0 0 6px #0f8; }
    .dot.off { background: #f44; }
    .label { font-size: 11px; color: #888; margin-bottom: 2px; }
    .value { font-family: monospace; font-size: 12px; word-break: break-all; }
    .hint { font-size: 10px; color: #555; margin-top: 6px; }
  </style>
</head>
<body>
  <h3>Browser Control</h3>

  <div class="row">
    <div class="dot" id="dot"></div>
    <span id="statusText">Connecting...</span>
  </div>

  <div class="label">Active Tab:</div>
  <div class="value" id="url" style="color:#888;font-size:11px;margin-bottom:8px">...</div>

  <div class="hint" id="hint">Native Messaging: com.kelvin.rbc</div>

  <script src="popup.js"></script>
</body>
</html>
